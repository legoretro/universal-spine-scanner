services:
  - type: web
    name: universal-spine-scanner
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SCANS_TABLE
        value: spine_scans
      - key: EBAY_CLIENT_ID
        sync: false
      - key: EBAY_CLIENT_SECRET
        sync: false
      - key: EBAY_MARKETPLACE_ID
        value: EBAY_US
      - key: EBAY_CURRENCY
        value: USD
